name: memo_everywhere
description: A simple offline-first memo app with Hive persistence.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  go_router: ^13.2.0
  uuid: ^4.3.3
  intl: ^0.18.1
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0
  connectivity_plus: ^6.0.0
  record: ^7.0.0
  speech_to_text: ^7.0.0
  path_provider: ^2.1.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  flutter_lints: ^3.0.0
  mocktail: ^1.0.1

flutter:
  uses-material-design: true
